---
apiVersion: v1
kind: Secret
metadata:
  name: anythingllm-oauth-config
  labels:
    app: anythingllm
    opendatahub.io/dashboard: 'true'
    opendatahub.io/odh-managed: 'true'
type: Opaque
data:
  # Random base64 encoded cookie secret (32 bytes)
  # To regenerate: openssl rand -base64 32
  cookie_secret: {{ randAlphaNum 32 | b64enc | quote }}
