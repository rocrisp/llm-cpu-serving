{{- if .Values.signing.enabled }}
apiVersion: ml.sigstore.dev/v1alpha1
kind: ModelValidation
metadata:
  name: {{ .Values.model.name }}-validation
spec:
  config:
    {{- if .Values.signing.publicKeyData }}
    publicKeyConfig:
      keyPath: /keys/signing-key.pub
    {{- else }}
    sigstoreConfig:
      certificateIdentity: {{ .Values.signing.certificateIdentity | quote }}
      certificateOidcIssuer: {{ .Values.signing.certificateOidcIssuer | quote }}
    {{- end }}
  model:
    path: /mnt/models
    signaturePath: /mnt/models/{{ .Values.signing.signaturePath | default "model.sig" }}
    {{- if .Values.signing.ignoreGitPaths }}
    ignoreGitPaths: true
    {{- end }}
    {{- if .Values.signing.ignorePaths }}
    ignorePaths: {{ .Values.signing.ignorePaths | toJson }}
    {{- end }}
{{- end }}
