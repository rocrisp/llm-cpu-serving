{{- if .Values.signing.enabled }}
{{- if or .Values.signing.modelImage .Values.signing.modelArchiveUrl }}
apiVersion: batch/v1
kind: Job
metadata:
  name: model-download
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      containers:
        {{- if .Values.signing.modelImage }}
        - name: copy-model
          image: {{ .Values.signing.modelImage }}
          command:
            - sh
            - -c
            - |
              echo "Copying signed model files to PVC..."
              cp -r /model/. /data/
              echo "Contents:"
              ls -la /data/
              SIGPATH="/data/{{ .Values.signing.signaturePath | default "model.sig" }}"
              if [ -f "$SIGPATH" ]; then
                echo "Found signature at $SIGPATH"
              else
                echo "WARNING: No signature file at $SIGPATH"
                echo "The model-validation init container will reject this model."
              fi
          volumeMounts:
            - name: model-storage
              mountPath: /data
        {{- else }}
        - name: download
          image: alpine:latest
          command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache curl tar
              echo "Downloading signed model from {{ .Values.signing.modelArchiveUrl }}"
              curl -fSL "{{ .Values.signing.modelArchiveUrl }}" -o /data/model.tar.gz
              echo "Extracting to /data..."
              tar -xzf /data/model.tar.gz -C /data
              rm -f /data/model.tar.gz
              echo "Contents:"
              ls -la /data/
              SIGPATH="/data/{{ .Values.signing.signaturePath | default "model.sig" }}"
              if [ -f "$SIGPATH" ]; then
                echo "Found signature at $SIGPATH"
              else
                echo "WARNING: No signature file at $SIGPATH"
                echo "The model-validation init container will reject this model."
              fi
          volumeMounts:
            - name: model-storage
              mountPath: /data
        {{- end }}
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: model-storage
{{- end }}
{{- end }}
