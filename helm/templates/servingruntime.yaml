apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  annotations:
    opendatahub.io/accelerator-name: ""
    opendatahub.io/apiProtocol: REST
    opendatahub.io/recommended-accelerators: ""
    opendatahub.io/template-display-name: CUSTOM - vLLM Serving Runtime for CPU
    opendatahub.io/template-name: vllm-cpu
    openshift.io/display-name: CUSTOM - vLLM CPU
  name: vllm-cpu
  labels:
    opendatahub.io/dashboard: "true"
spec:
  builtInAdapter:
    modelLoadingTimeoutMillis: 90000
  containers:
    - args:
        - --model
        {{- if .Values.signing.enabled }}
        - /data/signed-model
        {{- else }}
        - {{ .Values.model.storageUri | trimPrefix "hf://" | trimPrefix "oci://" }}
        {{- end }}
        - --port
        - "8080"
        - --max-model-len
        - {{ .Values.model.maxModelLen | quote }}
        - '--served-model-name'
        - {{ .Values.model.name }}
        - --dtype
        - float32
      env:
        - name: VLLM_CPU_DISABLE_AVX512
          value: "1"
        - name: ONEDNN_VERBOSE
          value: "0"
      image: {{ .Values.images.vllmRuntime.repository }}:{{ .Values.images.vllmRuntime.tag }}
      name: kserve-container
      ports:
        - containerPort: 8080
          name: http1
          protocol: TCP
      volumeMounts:
        {{- if .Values.signing.enabled }}
        - name: model-data
          mountPath: /data/signed-model
        {{- if .Values.signing.publicKeyData }}
        - name: signing-key
          mountPath: /keys
          readOnly: true
        {{- end }}
        {{- else }}
        []
        {{- end }}
  {{- if .Values.signing.enabled }}
  volumes:
    - name: model-data
      persistentVolumeClaim:
        claimName: model-storage
    {{- if .Values.signing.publicKeyData }}
    - name: signing-key
      secret:
        secretName: model-signing-pubkey
    {{- end }}
  {{- end }}
  multiModel: false
  supportedModelFormats:
    - autoSelect: true
      name: vLLM