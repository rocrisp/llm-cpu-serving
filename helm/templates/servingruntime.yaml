apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  annotations:
    opendatahub.io/accelerator-name: ""
    opendatahub.io/apiProtocol: REST
    opendatahub.io/recommended-accelerators: ""
    opendatahub.io/template-display-name: CUSTOM - vLLM Serving Runtime for CPU
    opendatahub.io/template-name: vllm-cpu
    openshift.io/display-name: CUSTOM - vLLM CPU
  name: vllm-cpu
  labels:
    opendatahub.io/dashboard: "true"
spec:
  builtInAdapter:
    modelLoadingTimeoutMillis: 90000
  containers:
    - args:
        - --model
        - /mnt/models
        - --port
        - "8080"
        - --max-model-len
        - {{ .Values.model.maxModelLen | quote }}
        - '--served-model-name'
        - {{ .Values.model.name }}
        - --dtype
        - float32
      env:
        - name: VLLM_CPU_DISABLE_AVX512
          value: "1"
        - name: ONEDNN_VERBOSE
          value: "0"
      image: {{ .Values.images.vllmRuntime.repository }}:{{ .Values.images.vllmRuntime.tag }}
      name: kserve-container
      ports:
        - containerPort: 8080
          name: http1
          protocol: TCP
      {{- if (and .Values.signing.enabled .Values.signing.publicKeyData) }}
      volumeMounts:
        - name: signing-key
          mountPath: /keys
          readOnly: true
      {{- end }}
  {{- if (and .Values.signing.enabled .Values.signing.publicKeyData) }}
  volumes:
    - name: signing-key
      secret:
        secretName: model-signing-pubkey
  {{- end }}
  multiModel: false
  supportedModelFormats:
    - autoSelect: true
      name: vLLM
