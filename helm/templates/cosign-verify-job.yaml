{{- if .Values.signing.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: cosign-verify-model
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: cosign-verify
          image: {{ .Values.signing.cosignImage }}
          {{- if .Values.signing.publicKey }}
          command:
            - cosign
          args:
            - verify
            - --key
            - /etc/cosign/cosign.pub
            - {{ .Values.model.storageUri | trimPrefix "oci://" }}
          volumeMounts:
            - name: cosign-pubkey
              mountPath: /etc/cosign
              readOnly: true
          {{- else }}
          command:
            - cosign
          args:
            - verify
            - --certificate-identity={{ .Values.signing.certificateIdentity }}
            - --certificate-oidc-issuer={{ .Values.signing.certificateOidcIssuer }}
            - {{ .Values.model.storageUri | trimPrefix "oci://" }}
          {{- end }}
      {{- if .Values.signing.publicKey }}
      volumes:
        - name: cosign-pubkey
          secret:
            secretName: cosign-pubkey
      {{- end }}
{{- end }}
